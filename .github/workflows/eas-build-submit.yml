name: EAS Build & Submit

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        type: choice
        options:
          - all
          - ios
          - android
        default: all
      profile:
        description: "EAS build profile"
        required: true
        type: choice
        options:
          - production
          - preview
        default: preview
      submit:
        description: "Submit to stores after build"
        required: false
        type: boolean
        default: false

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

# ──────────────────────────────────────────────────────────
#  STAGING — push to main → preview build → TestFlight
# ──────────────────────────────────────────────────────────
jobs:
  staging-build:
    name: "Staging Build (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'preview')
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' && fromJSON('["ios","android"]') || fromJSON(format('["{0}"]', inputs.platform))) || fromJSON('["ios","android"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (preview)
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile preview \
            --non-interactive \
            --wait

  staging-submit:
    name: "Staging Submit (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    needs: staging-build
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'preview' && inputs.submit == true)
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' && fromJSON('["ios","android"]') || fromJSON(format('["{0}"]', inputs.platform))) || fromJSON('["ios","android"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to TestFlight / Internal Testing
        if: matrix.platform == 'ios'
        run: |
          eas submit \
            --platform ${{ matrix.platform }} \
            --profile production \
            --latest \
            --non-interactive

# ──────────────────────────────────────────────────────────
#  PRODUCTION — push to release → production build → stores + OTA
# ──────────────────────────────────────────────────────────
  production-build:
    name: "Production Build (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/release') ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'production')
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' && fromJSON('["ios","android"]') || fromJSON(format('["{0}"]', inputs.platform))) || fromJSON('["ios","android"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (production)
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile production \
            --non-interactive \
            --wait

  production-submit:
    name: "Production Submit (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    needs: production-build
    # Always submit after production build (branch push or manual with submit flag)
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/release') ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'production' && inputs.submit == true)
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event_name == 'workflow_dispatch' && (inputs.platform == 'all' && fromJSON('["ios","android"]') || fromJSON(format('["{0}"]', inputs.platform))) || fromJSON('["ios","android"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to stores
        if: matrix.platform == 'ios'
        run: |
          eas submit \
            --platform ${{ matrix.platform }} \
            --profile production \
            --latest \
            --non-interactive

  production-ota:
    name: "Production OTA Update"
    runs-on: ubuntu-latest
    needs: production-submit
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/release') ||
      (github.event_name == 'workflow_dispatch' && inputs.profile == 'production' && inputs.submit == true)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          eas update \
            --channel production \
            --message "Production release — ${COMMIT_MSG}" \
            --non-interactive
